docRoot                   $VH_ROOT/public_html
vhDomain                  $VH_NAME
vhAliases                 www.$VH_NAME
adminEmails               admin@itgyani.com
enableGzip                1
enableIpGeo               1

errorlog $VH_ROOT/logs/$VH_NAME.error_log {
  useServer               0
  logLevel                WARN
  rollingSize             10M
}

accesslog $VH_ROOT/logs/$VH_NAME.access_log {
  useServer               0
  logFormat               "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\""
  logHeaders              5
  rollingSize             10M
  keepDays                10
  compressArchive         1
}

index  {
  useServer               0
  indexFiles              index.html
}

extprocessor openmaic {
  type                    proxy
  address                 127.0.0.1:3004
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            10
  respBuffer              0
}

context /.well-known/acme-challenge {
  location                /usr/local/lsws/Example/html/.well-known/acme-challenge
  allowBrowse             1
  rewrite  {
    enable                0
  }
  addDefaultCharset       off
}

context /classroom {
  type                    proxy
  handler                 openmaic
  addDefaultCharset       off
}

context /api {
  type                    proxy
  handler                 openmaic
  addDefaultCharset       off
}

context /upload {
  type                    proxy
  handler                 openmaic
  addDefaultCharset       off
}

context / {
  type                    proxy
  handler                 openmaic
  addDefaultCharset       off
}

rewrite  {
  enable                  1
  autoLoadHtaccess        1
}

vhssl  {
  keyFile                 /etc/letsencrypt/live/learn.theemployeefactory.com/privkey.pem
  certFile                /etc/letsencrypt/live/learn.theemployeefactory.com/fullchain.pem
  certChain               1
  enableECDHE             1
  renegProtection         1
  sslSessionCache         1
  enableSpdy              15
  enableStapling          1
  ocspRespMaxAge          86400
}
