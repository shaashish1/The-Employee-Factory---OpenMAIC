services:
  openmaic:
    image: openmaic_src-openmaic:latest
    network_mode: host
    environment:
      - PORT=3004
      - HOSTNAME=127.0.0.1
    env_file:
      - .env.local
    volumes:
      - ./server-providers.yml:/app/server-providers.yml:ro
      - openmaic-data:/app/data
    restart: unless-stopped

volumes:
  openmaic-data:
